# Use a Gradle image that includes OpenJDK 21.
# This image comes with Gradle pre-installed and configured.
FROM gradle:jdk21

# Set the working directory inside the container.
# This will be the root of your project within the container.
WORKDIR /app

# Copy the entire project directory into the container.
# The '.' on the left refers to your local project directory.
# The '.' on the right refers to the WORKDIR inside the container.
# This ensures all necessary Gradle files (like build.gradle) and source code are copied.
COPY . /app

# Build the project using Gradle.
# 'gradle build' compiles the source code, runs tests, and packages the application
# into a JAR file (typically found in build/libs).
# The '--no-daemon' flag ensures Gradle runs as a single process and exits when done,
# which is good practice for Docker builds.
# The '--console=plain' flag provides simpler output, useful in CI/CD environments.
RUN gradle build --no-daemon --console=plain

# Define the command to run your Java application when the container starts.
# This assumes your main application is packaged into a JAR file by Gradle.
# The common pattern for the JAR name is 'project-name-version.jar'.
# You might need to adjust 'oop-java-1.0-SNAPSHOT.jar' to match the actual name
# generated by your build.gradle file.
# You can find the exact JAR name in your local 'build/libs' directory after running 'gradle build'.
CMD ["java", "-jar", "build/libs/oop-java-1.0-SNAPSHOT.jar"]

